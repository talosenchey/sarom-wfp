<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>កម្រង សំណួរ-ចម្លើយ កម្មវិធីស្បៀងអាហារពេលព្រឹក</title>
    <style>
        /* រចនាបថទូទៅបែបកុមារ និងទាក់ទាញ */
        body {
            font-family: 'Khmer OS Battambang', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffeaa7 0%, #ffbe76 50%, #ff7675 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .app-container {
            background-color: white;
            border-radius: 35px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            padding: 30px;
            width: 100%;
            max-width: 680px;
            text-align: center;
            border: 8px solid #ffeaa7;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }

        /* គំនូរតុក្កតាពពកខាងក្រោយ */
        .app-container::before {
            content: "☁️";
            position: absolute;
            font-size: 80px;
            opacity: 0.1;
            top: 10px;
            left: -20px;
            animation: floatLeft 6s ease-in-out infinite;
        }

        .app-container::after {
            content: "☀️";
            position: absolute;
            font-size: 70px;
            opacity: 0.15;
            top: 20px;
            right: -20px;
            animation: rotateSun 12s linear infinite;
        }

        @keyframes floatLeft {
            0%, 100% { transform: translateX(0px); }
            50% { transform: translateX(15px); }
        }

        @keyframes rotateSun {
            100% { transform: rotate(360deg); }
        }

        /* រូបតំណាងម្ហូបអាហារមានចលនា */
        .food-icon-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 40px;
            margin-bottom: 10px;
        }

        .food-icon {
            display: inline-block;
            animation: bounce 2s infinite ease-in-out;
        }

        .food-icon:nth-child(2) { animation-delay: 0.3s; }
        .food-icon:nth-child(3) { animation-delay: 0.6s; }
        .food-icon:nth-child(4) { animation-delay: 0.9s; }
        .food-icon:nth-child(5) { animation-delay: 1.2s; }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-12px) scale(1.1); }
        }

        h1 {
            color: #ff4757;
            font-size: 26px;
            margin: 10px 0 5px 0;
            text-shadow: 2px 2px 0px #ffeaa7;
            font-weight: bold;
        }

        .subtitle {
            color: #ff7f50;
            font-weight: bold;
            margin-bottom: 25px;
            font-size: 15px;
            border-bottom: 3px solid #ff7f50;
            display: inline-block;
            padding-bottom: 5px;
        }

        /* ផ្នែកប្រអប់ស្វែងរក */
        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
        }

        .search-box input {
            flex: 1;
            padding: 14px 20px;
            border: 3px solid #ff7f50;
            border-radius: 20px;
            font-size: 16px;
            outline: none;
            font-family: inherit;
            box-shadow: inset 0 3px 6px rgba(0,0,0,0.05);
            transition: border-color 0.3s;
        }

        .search-box input:focus {
            border-color: #ff4757;
        }

        /* ប៊ូតុងទូទៅ */
        button {
            color: white;
            border: none;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 6px 0px rgba(0,0,0,0.1);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 0px rgba(0,0,0,0.1);
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0px rgba(0,0,0,0.1);
        }

        .btn-search { 
            background-color: #ff7f50; 
        }
        .btn-search:hover { 
            background-color: #ff6348; 
        }

        /* កាតបង្ហាញសំណួរ និងចម្លើយ */
        .quiz-card {
            background-color: #fff9e6;
            border: 4px dashed #ffb8b8;
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 25px;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            text-align: left;
            box-sizing: border-box;
            position: relative;
        }

        .question-box {
            font-size: 19px;
            color: #2f3542;
            font-weight: bold;
            line-height: 1.7;
            width: 100%;
            margin-bottom: 15px;
            border-bottom: 2px dashed #ffb8b8;
            padding-bottom: 12px;
        }

        .answer-box {
            font-size: 17px;
            color: #2f3542;
            line-height: 1.7;
            background-color: #e3fcef;
            padding: 18px;
            border-radius: 18px;
            width: 100%;
            display: none; /* លាក់ជាមុន */
            box-sizing: border-box;
            border-left: 8px solid #2ed573;
            white-space: pre-line; /* រក្សាទម្រង់ចុះបន្ទាត់ */
            animation: popIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* ផ្នែកបង្ហាញវឌ្ឍនភាព (Progress) */
        .progress-bar {
            font-size: 15px;
            color: #747d8c;
            margin-bottom: 15px;
            font-weight: bold;
            background-color: #f1f2f6;
            padding: 6px 15px;
            border-radius: 50px;
            display: inline-block;
        }

        /* ផ្នែកប៊ូតុងបញ្ជាខាងក្រោម */
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn-prev { background-color: #a4b0be; }
        .btn-prev:hover { background-color: #747d8c; }

        .btn-show { background-color: #2ed573; }
        .btn-show:hover { background-color: #26af5f; }

        .btn-hide { background-color: #ff4757; }
        .btn-hide:hover { background-color: #e84118; }
        
        .btn-random { background-color: #9b59b6; }
        .btn-random:hover { background-color: #8e44ad; }

        .btn-next { background-color: #54a0ff; }
        .btn-next:hover { background-color: #2e86de; }

        .no-result {
            color: #ff4757;
            text-align: center;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- រូបតំណាងម្ហូបអាហារស្អាតៗសម្រាប់កុមារ -->
        <div class="food-icon-container">
            <span class="food-icon">🥦</span>
            <span class="food-icon">🍳</span>
            <span class="food-icon">🍎</span>
            <span class="food-icon">🥛</span>
            <span class="food-icon">🥞</span>
        </div>

        <h1>កម្រង សំណួរ-ចម្លើយ</h1>
        <div class="subtitle">កម្មវិធីស្បៀងអាហារពេលព្រឹក (ប្រកួតយករង្វាន់) 🏆</div>
        
        <!-- ផ្នែកស្វែងរកសំណួរ -->
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="វាយលេខសំណួរ (ឧទាហរណ៍៖ 15) ឬពាក្យគន្លឹះ...">
            <button class="btn-search" onclick="searchQuestion()">🔍 ស្វែងរក</button>
        </div>

        <!-- បង្ហាញលេខរៀងសំណួរ -->
        <div class="progress-bar" id="progressArea">សំណួរទី ១ នៃ ៣០</div>

        <!-- កាតបង្ហាញសំណួរ និងចម្លើយ -->
        <div class="quiz-card">
            <div class="question-box" id="questionArea">កំពុងផ្ទុក...</div>
            <div class="answer-box" id="answerArea">កំពុងផ្ទុក...</div>
        </div>

        <!-- ប៊ូតុងបញ្ជាខាងក្រោម -->
        <div class="action-buttons">
            <button class="btn-prev" onclick="prevQuestion()">⬅️ ថយក្រោយ</button>
            <button class="btn-show" onclick="showAnswer()">👁️ បង្ហាញចម្លើយ</button>
            <button class="btn-hide" onclick="hideAnswer()">🙈 លាក់ចម្លើយ</button>
            <button class="btn-random" onclick="randomQuestion()">🎲 ចៃដន្យ</button>
            <button class="btn-next" onclick="nextQuestion()">➡️ បន្ទាប់</button>
        </div>
    </div>

    <script>
        // ទិន្នន័យសំណួរ-ចម្លើយ ទាំង៣០ពីឯកសារដើម ដោយគ្មានការបាត់បង់សូម្បីតែមួយម៉ាត់
        const quizData = [
            {
                id: 1,
                question: "1. តើអង្គការណាបានផ្តល់អាហារពេលព្រឹកដល់សាលារៀនយើង?",
                answer: "ចម្លើយ៖ កម្មវិធីអាហារពេលព្រឹកត្រូវបានផ្តល់ដោយកម្មវិធីស្បៀងអាហារពិភពលោក សហការជាមួយក្រសួងអប់រំ យុវជន និងកីឡា មន្ទីរអប់រំ យុវជន និងកីឡា និងការិ.អប់រំ យុវជន និងកីឡា។"
            },
            {
                id: 2,
                question: "2. តើមានមុខម្ហូបអ្វីខ្លះដែលប្អូនៗបានបរិភោគនៅសាលារៀន? សូមរៀបរាប់ (ឆ្លើយតាមមុខម្ហូបជាក់ស្តែងនៅតាមសាលារៀននិមួយៗ)។",
                answer: "ចម្លើយ៖ មុខម្ហូបនៅសាលារៀនយើងមានដូចជា៖\nបាយឆាបន្លែនិងស៊ុតទា ស្ងោត្រឡាចនិងសាច់ជ្រូក សម្លប្រហើរត្រីផ្ទក់ សម្លកកូរត្រីអណ្តែង ឆាត្រកួននិងសាច់ជ្រូកបីជាន់ សម្លម្ជូរគ្រឿងត្រីប្រា ឆាត្រកួនត្រីខ.....។ល។"
            },
            {
                id: 3,
                question: "3. តើ បន្លែ ត្រីសាច់ស៊ុត ដែលប្រើសម្រាប់ចម្អិនអាហារពេលព្រឹកបានមកពីណា?​",
                answer: "ចម្លើយ៖ សាលាបានធ្វើបញ្ជាទិញពីអ្នកផ្គត់ផ្គង់ ដែលអ្នកផ្គត់ផ្គង់ប្រមូលទិញពីកសិករនៅក្នុងសហគមន៍របស់យើង និង ប្រភេទបន្លែមួយចំនួនទៀត ទិញពីផ្សាក្នុងសហគមន៍ដូចជា ការ៉ុត​ ដើមខាត់ណា សណ្តែកដីលីង....។ល។"
            },
            {
                id: 4,
                question: "4. តើសហគមន៍មានកាតព្វកិច្ច​អ្វីខ្លះ​ដើម្បីជំរុញការអនុវត្តកម្មវិធីអាហារពេលព្រឹកនៅតាមសាលារៀនអោយមានដំណើរការល្អ? (សួរអាណាព្យាបាលសិស្ស)",
                answer: "ចម្លើយ៖ សហគមន៍មានកាតព្វកិច្ចដូចខាងក្រោម៖\n- ចូលរួមជាគ្រឿងទេសផ្សេង​ប្រហុក ខ្ទឹមសរ ស្ករ ម្ជូរ និងគ្រឿងផ្សំផ្សេងទៀតដូចជា ស្លឹកគ្រៃ រមៀត ខ្ជាយ ស្លឹកក្រូច\n- ចូលរួមជា អុស ឬ ថវិការសម្រាប់ទិញអុស\n- ថវិកាសម្រាប់ឧបត្ថម្ភចុងភៅ\n- ថវិកាសម្រាប់រៀបចំអាហារបន្ថែម (មានដូចជាផ្លែឈើ បង្អែម នំខ្មែរ....)\n- ចូលរួមសកម្មភាពផ្សេងតាមតម្រូវការរបស់សាលា (ថែទាំបរិស្ថានសាលារៀន ថែរក្សាស្បៀងកុំអោយបាត់បង់ ជំរុញកូនអោយហូបអាហារពេលព្រឹក ជំរុញកូនអោយមករៀនទៀងទាត់....។ល។)"
            },
            {
                id: 5,
                question: "5. តើកម្មវិធីអាហារពេលព្រឹកមានសារសំខាន់អ្វីខ្លះចំពោះកុមារ សូមរៀបរាប់?",
                answer: "ចម្លើយ៖ កម្មវិធីអាហារពេលព្រឹកមានគោលបំណងផ្តល់អាហារតាមសាលារៀនប្រកបដោយសុវត្ថិភាពនិងអាហារូបត្ថម្ភដល់សិស្សដើម្បីជំរុញការលូតលាស់និងភាពវៃឆ្លាតសំដៅលើកកម្ពស់ផលិតភាពការងារនាពេលអនាគត។\n• ជួយអោយកុមារបានហូបអាហារស្រស់ៗនិងចម្រុះដែលបានទិញមកពីសហគមន៍\n• ជួយជម្រុញកុមារគ្រប់អាយុអោយមកចុះឈ្មោះចូលរៀន\n• ជួយកុមារអោយរៀនបានពេញម៉ោង (ពីម៉ោង ៧ដល់ម៉ោង១១) និងកាត់បន្ថយភាគរយសិស្សបោះបង់\n• ជួយអោយកុមារមានសុខភាពល្អ ប្រាជ្ញាឈ្លាសវៃ រៀនបានពូកែ និងមានអនាគត់ល្អ\n• ជួយកាត់បន្ថយការចំណាយរបស់អាណាព្យាបាលសិស្ស\n• ជួយជម្រុញអោយមានកំណើនសេដ្ឋកិច្ចខ្នាតតូចនៅក្នុងសហគមន៍"
            },
            {

                answer: "ចម្លើយ៖ លេខទូរស័ព្ទទាន់ហេតុការណ៍ (hotline)៖ ១៨០០ ២០៣ ១៨៣"

        let currentIndex = 0;

        // មុខងារបង្ហាញសំណួរ និងចម្លើយតាមលំដាប់លំដោយ
        function displayQuiz(index) {
            if(quizData.length > 0) {
                document.getElementById('questionArea').innerText = quizData[index].question;
                document.getElementById('answerArea').innerText = quizData[index].answer;
                document.getElementById('answerArea').style.display = 'none'; // លាក់ចម្លើយរាល់ពេលប្តូរសំណួរ
                document.getElementById('questionArea').classList.remove('no-result');
                
                // បង្ហាញលេខរៀងវឌ្ឍនភាព
                document.getElementById('progressArea').innerText = `សំណួរទី ${index + 1} នៃ ${quizData.length}`;
            }
        }

        // មុខងារបង្ហាញចម្លើយ
        function showAnswer() {
            document.getElementById('answerArea').style.display = 'block';
        }

        // មុខងារលាក់ចម្លើយ
        function hideAnswer() {
            document.getElementById('answerArea').style.display = 'none';
        }

        // មុខងារទៅសំណួរបន្ទាប់
        function nextQuestion() {
            currentIndex = (currentIndex + 1) % quizData.length;
            displayQuiz(currentIndex);
        }

        // មុខងារថយទៅសំណួរមុន
        function prevQuestion() {
            currentIndex = (currentIndex - 1 + quizData.length) % quizData.length;
            displayQuiz(currentIndex);
        }

        // មុខងារជ្រើសរើសសំណួរដោយចៃដន្យ (Random)
        function randomQuestion() {
            if (quizData.length <= 1) return;
            let randomIndex;
            // ធានាថាមិនយកចំសំណួរដែលកំពុងបង្ហាញដដែលទេ
            do {
                randomIndex = Math.floor(Math.random() * quizData.length);
            } while (randomIndex === currentIndex);
            
            currentIndex = randomIndex;
            displayQuiz(currentIndex);
        }

        // មុខងារស្វែងរកសំណួរ (អាចវាយលេខ ឬ ពាក្យគន្លឹះ)
        function searchQuestion() {
            const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
            if(keyword === "") return;
            
            // ស្វែងរកតាមលេខ ឬពាក្យគន្លឹះក្នុងសំណួរ
            const foundIndex = quizData.findIndex(item => 
                item.id.toString() === keyword || item.question.toLowerCase().includes(keyword)
            );

            if (foundIndex !== -1) {
                currentIndex = foundIndex;
                displayQuiz(currentIndex);
            } else {
                document.getElementById('questionArea').innerText = "❌ រកមិនឃើញសំណួរ ឬលេខដែលប្អូនចង់រកទេ! សូមសាកល្បងវាយពាក្យផ្សេងទៀតណា!";
                document.getElementById('questionArea').classList.add('no-result');
                document.getElementById('answerArea').style.display = 'none';
                document.getElementById('progressArea').innerText = "ស្វែងរកគ្មានលទ្ធផល";
            }
        }

        // ដំណើរការបង្ហាញសំណួរទី១ ភ្លាមៗនៅពេលបើក App
        displayQuiz(currentIndex);
    </script>
